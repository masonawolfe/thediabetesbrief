                let showHypoFearResource = false;
                if (allHigh) {
                    const newDose = (dose * 1.1).toFixed(1);
                    recommendation = `You may want to consider a 10% increase to ${newDose} units.`;
                } else if (anyLow) {
                    const newDose = (dose * 0.9).toFixed(1);
                    recommendation = `You may want to consider a 10% decrease to ${newDose} units.`;
                    showHypoFearResource = true;
                } else {
                    recommendation = `Your readings appear relatively stable. Continue monitoring and discuss trends with your provider.`;
                }

                recommendation_html += `
                    <div class="recommendation-result">
                        <div style="margin-bottom: 1rem;">
                            <strong>Insulin Type:</strong> ${insulin.name}<br>
                            <strong>Duration:</strong> ${insulin.duration}<br>
                            <strong>Peak Time:</strong> ${insulin.peakTime}<br>
                            <strong>Average Fasting Reading:</strong> ${avgReading.toFixed(0)} mg/dL
                        </div>
                        <div class="alert-callout">
                            <strong>Provider Discussion Required:</strong> This is educational guidance only. ${recommendation}
                        </div>
                        ${showHypoFearResource ? `
                            <div class="alert alert-info" style="margin-top: 1rem;">
                                <strong>📚 Resource:</strong> Your readings suggest a dose reduction may help reduce low blood sugar episodes. If you're concerned about hypoglycemia, consider reading our topic on <strong>"Understanding and Managing Fear of Low Blood Sugar"</strong> in the <a href="#" onclick="app.switchTab('education'); return false;" style="color: var(--info-dark); text-decoration: underline; cursor: pointer;">Education Hub</a>.
                            </div>
                        ` : ''}
                        <label style="display: flex; align-items: center; margin-top: 1rem; gap: 0.75rem;">
                            <input type="checkbox" id="basal-reveal-checkbox" onchange="app.toggleBasalBlur()" aria-label="I understand the limitation" />
                            <span>I understand and want to see the recommendation</span>
                        </label>
                        <div id="basal-recommendation-blurred" class="recommendation-blurred" style="margin-top: 1rem; padding: 1rem; background: var(--gray-100); border-radius: 0.375rem;">
                            <strong>Recommendation:</strong> ${recommendation}
                        </div>
                    </div>
                `;

                document.getElementById('basal-result').innerHTML = recommendation_html;
                document.getElementById('basal-result').style.display = 'block';
            },

            toggleBasalBlur() {
                const elem = document.getElementById('basal-recommendation-blurred');
                if (elem) {
                    elem.classList.toggle('recommendation-blurred');
                }
            },

            toggleBasalDrugInteractions() {
                state.basalDrugInteractionsExpanded = !state.basalDrugInteractionsExpanded;
                render();
            },

            toggleBasalCostCoverage() {
                state.basalCostCoverageExpanded = !state.basalCostCoverageExpanded;
                render();
            },

            updateBasalInsulinSelection() {
                render();
            },

            openPrivacyModal() {
                state.showPrivacyModal = true;
                render();
            },

            closePrivacyModal() {
                state.showPrivacyModal = false;
                render();
            },

            openAdverseModal() {
                state.showAdverseModal = true;
                render();
            },

            closeAdverseModal() {
                state.showAdverseModal = false;
                render();
            },

            submitAdverseEvent() {
                const eventType = document.getElementById('event-type').value;
                const date = document.getElementById('event-date').value;
                const severity = document.getElementById('event-severity').value;
                const description = document.getElementById('event-description').value;

                if (!eventType || !description.trim()) {
                    alert('Please fill in all required fields');
                    return;
                }

                state.adverseEvents.push({
                    id: Date.now(),
                    eventType,
                    date,
                    severity,
                    description,
                    createdAt: new Date().toISOString()
                });

                saveToLocalStorage();
                auditLog('Adverse event reported', { eventType, severity });
                state.showAdverseModal = false;
                addToast('Report submitted successfully', 'success');
                render();
            },

            downloadAdverseEvents() {
                if (state.adverseEvents.length === 0) {
                    alert('No events to download');
                    return;
                }

                const csv = [
                    ['Date', 'Type', 'Severity', 'Description', 'Submitted'],
                    ...state.adverseEvents.map(e => [
                        e.date,
                        e.eventType,
                        e.severity,
                        e.description,
                        new Date(e.createdAt).toLocaleDateString()
                    ])
                ];

                const csvContent = csv.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `diacare-adverse-events-${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            },

            clearAdverseEvents() {
                if (confirm('Are you sure? This cannot be undone.')) {
                    state.adverseEvents = [];
                    saveToLocalStorage();
                    addToast('Events cleared', 'info');
                    render();
                }
            },

            clearAllData() {
                if (confirm('This will clear ALL your data including topics read, quizzes, and reports. This cannot be undone.')) {
                    localStorage.clear();
                    location.reload();
                }
            },

            setFeedbackRating(n) {
                state.feedbackRating = n;
                render();
            },

            updateFeedbackText(text) {
                state.feedbackText = text;
            },

            submitFeedback() {
                const feedback = {
                    rating: state.feedbackRating,
                    comment: state.feedbackText,
                    timestamp: Date.now(),
                };
                const existing = JSON.parse(localStorage.getItem('tdb_feedback') || '[]');
                existing.push(feedback);
                localStorage.setItem('tdb_feedback', JSON.stringify(existing));
                state.feedbackSubmitted = true;
                state.feedbackRating = 0;
                state.feedbackText = '';
                render();
            },

            resetFeedback() {
                state.feedbackSubmitted = false;
                render();
            },

            openHelpModal() {
                state.showPrivacyModal = true;
                render();
            },

            openSettings() {
                state.activeTab = 'settings';
                render();
            },

            updateTermsCheckbox() {
                const checkbox = document.getElementById('terms-checkbox');
                const button = document.getElementById('accept-terms-btn');
                button.disabled = !checkbox.checked;
            },

            acceptTerms() {
                state.termsAccepted = true;
                saveToLocalStorage();
                auditLog('Terms accepted', {});
                state.showOnboarding = true;
                state.onboardingStep = 0;
                render();
            },

            nextOnboardingStep() {
                if (state.onboardingStep < 4) {
                    state.onboardingStep++;
                    render();
                }
            },

            completeOnboarding() {
                state.onboardingComplete = true;
                state.showOnboarding = false;
                state.onboardingStep = 0;
                saveToLocalStorage();
                auditLog('Onboarding completed', {});
                addToast('Welcome! Start by exploring the Education Hub or taking a Quiz.', 'success');
                render();
            },

            openDDS4Modal() {
                state.showDDS4Modal = true;
                render();
            },

            closeDDS4Modal() {
                state.showDDS4Modal = false;
                render();
            },

            setDDS4Response(questionId, value) {
                state.dds4Responses[questionId] = value;
                render();
            },

            submitDDS4() {
                if (Object.keys(state.dds4Responses).length !== 4) {
                    alert('Please answer all questions');
                    return;
                }
                saveDDS4Screening();
                const scores = Object.values(state.dds4Responses).map(v => parseInt(v));
                const avgScore = scores.reduce((a, b) => a + b, 0) / scores.length;

                let message = 'Wellness check complete. ';
                let type = 'success';

                if (avgScore >= 3) {
                    type = 'warning';
                    message += 'We notice you may be experiencing some diabetes distress. Please reach out to a mental health professional or your healthcare provider for support.';
                }

                auditLog('DDS-4 screening completed', { averageScore: avgScore.toFixed(2) });
                addToast(message, type);
                state.showDDS4Modal = false;
                render();
            },

            openProviderSummary() {
                state.showProviderSummary = true;
                render();
            },

            closeProviderSummary() {
                state.showProviderSummary = false;
                render();
            },

            switchProfile(profileIndex) {
                profileIndex = parseInt(profileIndex);
                if (profileIndex < 0 || profileIndex >= state.profiles.length) return;

                // Save current profile data
                localStorage.setItem('tdb_profiles', JSON.stringify(state.profiles));

                // Load new profile
                state.currentProfileIndex = profileIndex;
                const newProfile = state.profiles[profileIndex];

                localStorage.setItem('tdb_current_profile', profileIndex);

                auditLog('Profile switched', { profileName: newProfile.name });
                addToast(`Switched to profile: ${newProfile.name}`, 'success');
                render();
            },

            openAddProfileModal() {
                if (state.profiles.length >= 5) {
                    addToast('Maximum 5 profiles allowed', 'warning');
                    return;
                }
                const profileName = prompt('Enter a name for the new profile:');
                if (!profileName || profileName.trim() === '') return;

                state.profiles.push({
                    name: profileName.trim(),
                    data: {}
                });
                localStorage.setItem('tdb_profiles', JSON.stringify(state.profiles));
                auditLog('Profile created', { profileName: profileName.trim() });
                addToast(`Profile "${profileName}" created!`, 'success');
                render();
            },

            deleteProfile(index) {
                if (state.profiles.length <= 1) {
                    addToast('You must have at least one profile', 'warning');
                    return;
                }
                const profileName = state.profiles[index].name;
                if (confirm(`Delete profile "${profileName}"? This cannot be undone.`)) {
                    state.profiles.splice(index, 1);
                    if (state.currentProfileIndex >= state.profiles.length) {
                        state.currentProfileIndex = state.profiles.length - 1;
                    }
                    localStorage.setItem('tdb_profiles', JSON.stringify(state.profiles));
                    localStorage.setItem('tdb_current_profile', state.currentProfileIndex);
                    auditLog('Profile deleted', { profileName: profileName });
                    addToast(`Profile "${profileName}" deleted`, 'success');
                    render();
                }
            },

            // Food Insecurity Screening
            openFoodInsecurityScreening() {
                const lastChecked = localStorage.getItem('tdb_food_insecurity_last_checked');
                if (lastChecked) {
                    const daysSinceCheck = (Date.now() - parseInt(lastChecked)) / (1000 * 60 * 60 * 24);
                    if (daysSinceCheck < 90) {
                        addToast(`You last checked 90 days ago. Next reminder in ${Math.ceil(90 - daysSinceCheck)} days.`, 'info');
                        return;
                    }
                }
                state.showFoodInsecurityModal = true;
                state.foodInsecurityResponses = { q1: '', q2: '' };
                render();
            },

            closeFoodInsecurityModal() {
                state.showFoodInsecurityModal = false;
                render();
            },

            setFoodInsecurityResponse(question, value) {
                state.foodInsecurityResponses[question] = value;
            },

            submitFoodInsecurityScreening() {
                const q1 = state.foodInsecurityResponses.q1;
                const q2 = state.foodInsecurityResponses.q2;

                if (!q1 || !q2) {
                    alert('Please answer both questions');
                    return;
                }

                const hasInsecurity = q1 === 'often' || q1 === 'sometimes' || q2 === 'often' || q2 === 'sometimes';

                localStorage.setItem('tdb_food_insecurity_last_checked', Date.now());
                state.foodInsecurityLastChecked = Date.now().toString();

                state.showFoodInsecurityModal = false;

                if (hasInsecurity) {
                    addToast('Food insecurity resources have been added to your view.', 'warning');
                    // Show resource modal or inline info
                    const resourcesList = FOOD_INSECURITY_RESOURCES.map(r => `${r.title}: ${r.description || r.url}`).join('\n\n');
                    alert('Food Insecurity Resources Available:\n\n' + resourcesList);
                } else {
                    addToast('Thank you for checking in on your food security.', 'success');
                }

                render();
            },

            // Data Export Functions
            exportDataCSV() {
                const timestamp = new Date().toISOString().split('T')[0];
                const filename = `diabetes-brief-export-${timestamp}.csv`;

                const profileData = state.profiles[state.currentProfileIndex] || {};
                const csv = [
                    ['Data Export from The Diabetes Brief'],
                    ['Date', new Date().toLocaleDateString()],
                    [],
                    ['PROFILE'],
                    ['Name', profileData.name || 'N/A'],
                    [],
                    ['LEARNING HISTORY'],
                    ['Topics Read', state.topicsRead.length],
                    ['Quizzes Completed', localStorage.getItem('tdb_quizzes_completed') || '0'],
                    [],
                    ['QUIZ RESULTS'],
                    ['Date', 'Score %'],
                    ...state.quizHistory.map(q => [q.date, q.score]),
                    [],
                    ['ADVERSE EVENTS'],
                    ['Date', 'Type', 'Severity', 'Description'],
                    ...state.adverseEvents.map(e => [e.date, e.eventType, e.severity, e.description]),
                    [],
                    ['DDS-4 SCREENING'],
                    ['Last Score', localStorage.getItem('tdb_last_dds4_score') || 'Not completed'],
                    ['Last Checked', localStorage.getItem('tdb_last_dds4_screening') ? new Date(parseInt(localStorage.getItem('tdb_last_dds4_screening'))).toLocaleDateString() : 'Never']
                ];

                const csvContent = csv.map(row => row.map(cell => `"${(cell || '').toString().replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                auditLog('Data exported', { format: 'CSV' });
                addToast('Data exported as CSV', 'success');
            },

            exportDataJSON() {
                const timestamp = new Date().toISOString().split('T')[0];
                const filename = `diabetes-brief-export-${timestamp}.json`;

                const exportData = {
                    exportDate: new Date().toISOString(),
                    profile: {
                        name: state.profiles[state.currentProfileIndex]?.name || 'Default'
                    },
                    learning: {
                        topicsRead: state.topicsRead,
                        topicsReadCount: state.topicsRead.length,
                        quizzesCompleted: parseInt(localStorage.getItem('tdb_quizzes_completed') || '0'),
                        quizHistory: state.quizHistory
                    },
                    adverseEvents: state.adverseEvents,
                    dds4: {
                        lastScore: parseFloat(localStorage.getItem('tdb_last_dds4_score') || 'null'),
                        lastChecked: localStorage.getItem('tdb_last_dds4_screening') ? new Date(parseInt(localStorage.getItem('tdb_last_dds4_screening'))).toISOString() : null
                    },
                    disclaimer: 'This is your personal diabetes education data. Always discuss with your healthcare provider before making any medical decisions.'
                };

                const jsonContent = JSON.stringify(exportData, null, 2);
                const blob = new Blob([jsonContent], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                auditLog('Data exported', { format: 'JSON' });
                addToast('Data exported as JSON', 'success');
            },

            // DC-027: CGM Data Import
            handleCGMFileUpload(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const csvText = e.target.result;
                        const cgmData = parseCSVData(csvText);

                        if (cgmData.length === 0) {
                            addToast('Could not parse CSV. Check format and column names.', 'error');
                            return;
                        }

                        state.cgmData = cgmData;
                        state.cgmImportSummary = calculateCGMStats(cgmData);
                        auditLog('CGM data imported', { readingsCount: cgmData.length });
                        addToast(`Successfully imported ${cgmData.length} CGM readings`, 'success');
                        render();
                    } catch (err) {
                        addToast('Error parsing CSV file: ' + err.message, 'error');
                    }
                };
                reader.readAsText(file);

                // Reset the input
                event.target.value = '';
            },

            clearCGMData() {
                if (confirm('Clear all imported CGM data?')) {
                    state.cgmData = [];
                    state.cgmImportSummary = null;
                    addToast('CGM data cleared', 'success');
                    render();
                }
            },

            // DC-028: PIN Authentication
            openPINSetupModal() {
                state.showPINSetup = true;
                state.pinInput = '';
                render();
            },

            handlePINInput(value) {
                state.pinInput = value.slice(0, 4).replace(/[^0-9]/g, '');
                render();
            },

            verifyUserPIN() {
                if (!state.userPin) return;

                const isLocked = state.pinLockedUntil && Date.now() < state.pinLockedUntil;
                if (isLocked) return;

                if (verifyPin(state.pinInput, state.userPin)) {
                    state.showPINLock = false;
                    state.pinInput = '';
                    state.pinAttempts = 0;
                    state.pinLockedUntil = null;
                    auditLog('PIN verified - app unlocked', {});
                    render();
                } else {
                    state.pinAttempts++;
                    state.pinInput = '';

                    if (state.pinAttempts >= 3) {
                        state.pinLockedUntil = Date.now() + (30 * 1000);
                        auditLog('PIN verification failed - lockout', { attempts: state.pinAttempts });
                        addToast('Too many incorrect attempts. Locked for 30 seconds.', 'error');
                    } else {
                        auditLog('PIN verification failed', { attempts: state.pinAttempts });
                        addToast(`Incorrect PIN. ${3 - state.pinAttempts} attempts remaining.`, 'error');
                    }
                    render();
                }
            },

            openForgotPINModal() {
                const profileName = state.profiles[state.currentProfileIndex]?.name || 'Default';
                const enteredName = prompt(`To reset your PIN, confirm your profile name (currently "${profileName}"):`);

                if (enteredName && enteredName === profileName) {
                    state.userPin = null;
                    state.showPINLock = false;
                    state.pinInput = '';
                    state.pinAttempts = 0;
                    localStorage.removeItem('tdb_user_pin');
                    auditLog('PIN reset via forgot PIN flow', {});
                    addToast('PIN has been reset. You can set a new one in Settings.', 'success');
                    render();
                } else if (enteredName !== null) {
                    addToast('Profile name did not match.', 'error');
                }
            },

            changePIN() {
                const currentPin = prompt('Enter your current PIN:');
                if (!currentPin) return;

                if (!verifyPin(currentPin, state.userPin)) {
                    addToast('Incorrect PIN', 'error');
                    return;
                }

                const newPin = prompt('Enter new 4-digit PIN:');
                if (!newPin || newPin.length !== 4 || !/^\d{4}$/.test(newPin)) {
                    addToast('PIN must be exactly 4 digits', 'error');
                    return;
                }

                state.userPin = hashPin(newPin);
                localStorage.setItem('tdb_user_pin', state.userPin);
                auditLog('PIN changed', {});
                addToast('PIN changed successfully', 'success');
                render();
            },

            removePIN() {
                const pin = prompt('Enter your PIN to remove it:');
                if (!pin) return;

                if (!verifyPin(pin, state.userPin)) {
                    addToast('Incorrect PIN', 'error');
                    return;
                }

                if (confirm('Remove PIN protection?')) {
                    state.userPin = null;
                    state.showPINLock = false;
                    localStorage.removeItem('tdb_user_pin');
                    auditLog('PIN removed', {});
                    addToast('PIN protection removed', 'success');
                    render();
                }
            },

            // Helper methods for modals and UI
            closePINSetupModal() {
                state.showPINSetup = false;
                state.pinInput = '';
                render();
            },

            confirmPINSetup() {
                if (state.pinInput.length !== 4) {
                    addToast('PIN must be exactly 4 digits', 'error');
                    return;
                }

                state.userPin = hashPin(state.pinInput);
                state.pinInput = '';
                state.showPINSetup = false;
                state.showPINLock = true;
                localStorage.setItem('tdb_user_pin', state.userPin);
                state.dataEncryptionEnabled = true;
                auditLog('PIN set', {});
                addToast('PIN set successfully! App is now locked.', 'success');
                render();
            },

            // DC-034: Language Toggle
            toggleLanguage() {
                state.language = state.language === 'en' ? 'es' : 'en';
                localStorage.setItem('tdb_language', state.language);
                auditLog('Language changed', { newLanguage: state.language });
                render();
            },

            // DC-033: Audit Log Management
            openInstagramPreview(postId) {
                state.instagramActivePost = postId;
                state.instagramActiveSlide = 0;
                render();
                window.scrollTo(0, 0);
            },

            closeInstagramPreview() {
                state.instagramActivePost = null;
                state.instagramActiveSlide = 0;
                render();
            },

            nextInstagramSlide() {
                const maxSlides = (CAROUSEL_SLIDES[state.instagramActivePost] || []).length || 6;
                if (state.instagramActiveSlide < maxSlides - 1) {
                    state.instagramActiveSlide++;
                    render();
                }
            },

            prevInstagramSlide() {
                if (state.instagramActiveSlide > 0) {
                    state.instagramActiveSlide--;
                    render();
                }
            },

            goToInstagramSlide(index) {
                state.instagramActiveSlide = index;
                render();
            },

            copyInstagramCaption(postId) {
                fetch('/carousels/' + postId + '/caption.txt')
                    .then(r => r.text())
                    .then(text => {
                        const caption = text.split('---')[0].trim();
                        navigator.clipboard.writeText(caption).then(() => {
                            app.showToast('Caption copied to clipboard!');
                        });
                    });
            },

            copyInstagramHashtags(postId) {
                fetch('/carousels/' + postId + '/caption.txt')
                    .then(r => r.text())
                    .then(text => {
                        const parts = text.split('---');
                        if (parts.length > 1) {
                            const hashtags = parts[1].replace(/Hashtags.*?:/i, '').trim();
                            navigator.clipboard.writeText(hashtags).then(() => {
                                app.showToast('Hashtags copied to clipboard!');
                            });
                        }
                    });
            },

            toggleSettingsSection(section) {
                if (!state.settingsExpanded) state.settingsExpanded = {};
                state.settingsExpanded[section] = state.settingsExpanded[section] === false ? true : false;
                render();
            },

            toggleAuditLog() {
                state.showAuditLog = !state.showAuditLog;
                render();
            },

            exportAuditLog() {
                const auditLog = JSON.parse(localStorage.getItem('tdb_audit_log') || '[]');
                if (auditLog.length === 0) {
                    addToast('No audit log entries to export.', 'warning');
                    return;
                }

                const csv = ['timestamp,action,profile,details'];
                auditLog.forEach(entry => {
                    const details = JSON.stringify(entry.details).replace(/"/g, '""');
                    csv.push(`"${entry.timestamp}","${entry.action}","${entry.profile || ''}","${details}"`);
                });

                const csvContent = csv.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `audit-log-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);

                auditLog('Audit log exported', {});
                addToast('Audit log exported successfully.', 'success');
            }
        };

        // Initialize app
        function initApp() {
            auditLog('App opened', {});
            if (!state.termsAccepted) {
                render();
            } else if (!state.onboardingComplete) {
                state.showOnboarding = true;
                render();
            } else {
                render();
            }
        }

        // Start the app
        try {
            initApp();
        } catch (e) {
            document.getElementById('root').innerHTML = '<div style="padding:2rem;color:red;font-size:1.2rem;"><h2>The Diabetes Brief Error</h2><p>' + e.message + '</p><pre>' + e.stack + '</pre></div>';
        }

        // PWA: Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
